  - {type: variant, offset: 1084, length: 26, content: 此中八位文錯，今依衡函尊勝佛頂念誦法中所明方位而正之云＋（高本末有此批貞享元甲子年九月二十一日以和本并高麗印本校之點之了，是則為明日授于諸禪偈也，金剛乘末派淨嚴四十六載）【甲】云【大】，（云高本末有此批貞享元甲子年九月二十一日以和本并高麗印本校之點之了，是則為明日授于諸禪偈也，金剛乘末派淨嚴四十六載）【甲】云云高本末有此批貞享元甲子年九月二十一日以和本并高麗印本校之點之了，是則為明日授于諸禪偈也，金剛乘末派淨嚴四十六載, 宋: '', 元: '', 明: ''}
