  - {type: punctuation, offset: 137, content: 「, id: KR6j0390_T_001-bkkpn14}
  - {type: variant, offset: 137, length: 108, content: '若善男子善女人作八曼荼＝茶【宋】【元】＊荼【大】＊，茶【宋】【元】＊荼茶羅者，云何建立？復依何法起＝趣【三】起【大】，趣【宋】【元】【明】起趣

      無量福，令修行者速證菩提？」爾時如來讚寶藏月光菩薩言：「善哉善哉！善男子！（汝）＋能【三】【甲】能【大】，汝能【宋】【元】【明】【甲】能汝能問如是甚深之義，而為利益無量無邊有情與安樂故，及能淨除三惡趣故，為證無比無上智故。汝今善聽。若諸有情纔聞此密言者，得長壽樂。', 原: 於是寶藏月光菩薩言}
