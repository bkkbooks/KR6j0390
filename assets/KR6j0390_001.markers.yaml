  - {type: variant, offset: 128, length: 9, content: 於是＋（如來應等正徧知告）【三】【甲】是【大】，是如來應等正徧知告【宋】【元】【明】【甲】是是如來應等正徧知告寶藏月光菩薩言, 甲: 若善男子善女人作八曼荼羅者云何建立復依何法起無量福令修行者速證菩提爾時如來讚寶藏月光菩薩言善哉善哉善男子能問如是甚深之義而為利益無量無邊有情與安樂故及能淨除三惡趣故為證無比無上智故汝今善聽若諸有情纔聞此密言者得長壽樂}
  - {type: variant, offset: 129, length: 1, content: 是, 宋: 是如來應等正徧知告, 元: 是如來應等正徧知告, 明: 是如來應等正徧知告, 甲: 是如來應等正徧知告}
