body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶贈司空諡大鑒正號大廣智大興善寺三藏法師不空奉詔譯如是我聞一時薄伽梵住補怛落伽山聖觀自在菩薩宮殿與百千俱胝那庾多菩薩前後圍繞爾時衆中有一菩薩名曰寶藏月光從座而起整理衣服偏袒右肩曲躬合掌白言薄伽梵我有少疑唯願如來聽許咨問於是寶藏月光菩薩言若善男子善女人作八曼荼羅者云何建立復依何法起無量福令修行者速證菩提爾時如來讚寶藏月光菩薩言善哉善哉善男子能問如是甚深之義而為利益無量無邊有情與安樂故及能淨除三惡趣故為證無比無上智故汝今善聽若諸有情才聞此密言者得長壽樂善男子有八曼荼羅是八大菩薩甚深法要若有有情依法建立此八曼荼羅一遍者所有十惡五逆謗方等經皆悉銷滅一切所求義利勝願悉得成就即說如來密言曰唵摩訶尾囉娑嚩二合引賀引即曼荼囉中想於如來真金色身三十二相坐蓮華臺次說觀自在菩薩密言曰吽纈唎二合郝鉢納麼二合室哩二合曳娑嚩二合引訶即想曼荼羅中聖觀自在赤色身左手持蓮華右手施願頭冠中有無量壽如來次說慈氏菩薩密言曰每訶哩爾娑嚩二合引訶於觀自在菩薩後想慈氏菩薩金色身左手執軍持右手施無畏冠中有窣堵波半跏坐次說虛空藏菩薩密言曰阿引孽婆也娑嚩二合引訶於佛背後想虛空藏菩薩左手持寶安於心上右手施流出無量寶次說普賢菩薩密言曰纈唎二合惹也娑嚩二合引訶虛空藏菩薩左邊想普賢菩薩戴五佛冠金色身右手持劍左手施願半跏而坐次說金剛手菩薩密言曰唵鑁囉嚩娑嚩二合引訶於如來左邊想金剛手菩薩右手執金剛杵左手安於胯戴五佛冠身青色半跏而坐次說曼殊室利菩薩密言曰室利二合闍㘕誐娑嚩二合引訶於金剛手菩薩前想曼殊室利童真菩薩五髻童子形左手執青蓮花花中有五股金剛杵右手作施願身金色半跏而坐次說除蓋障菩薩密言曰匿伐囉拏娑嚩二合訶引於曼殊室唎菩薩右想除蓋障菩薩金色身左手持如意幢右手施願半跏而坐次說地藏菩薩密言曰乞灑二合訶囉惹娑嚩二合引賀引於如來前想地藏菩薩頭冠瓔珞面貌熙怡寂靜愍念一切有情左手安臍下拓鉢右手覆掌向下大指捻頭指作安慰一切有情想此八大菩薩曼荼羅供養觀行法若善男子善女人受持此八曼荼羅經一切業障悉皆銷滅速證無上正等菩提佛說是經已諸大菩薩及聲聞衆一切天龍八部聞佛所說歡喜奉行八大菩薩讚圓寂宮城門能摧戶扇者諸佛法受用救世我頂禮自手流清水能除餓鬼渴三界如意樹頂禮蓮華手大慈水為心能息瞋恚火頂禮慈氏尊能斷欲弓弦虛空藏妙慧虛空寂靜尊生死流解脫頂禮佛心子無邊有情惑能息無益心普賢我頂禮善逝上首子塵勞盡僮僕超勝摩羅軍頂禮金剛手能說一切明頂禮妙吉祥持妙童子形舒遍智慧燈攘奪三界冥一切除蓋障是故我頂禮無盡智慧尊能生無竭辨如地諸有情所依一不斷堅慧悲愍藏地藏我頂禮此真善逝子讚揚所獲福以此諸有情如彼成讚器此中八位文錯今依衡函尊勝佛頂念誦法中所明方位而正之云
